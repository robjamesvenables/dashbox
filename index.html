<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashbox</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230a0c0f'/><rect x='4' y='20' width='6' height='8' rx='1.5' fill='white' opacity='0.4'/><rect x='13' y='14' width='6' height='14' rx='1.5' fill='white' opacity='0.7'/><rect x='22' y='8' width='6' height='20' rx='1.5' fill='%2300d4aa'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c0f;--surface:#111318;--surface2:#161a22;--border:#1e2129;--border2:#2a2f3a;
  --text:#c8cdd8;--muted:#4a5060;--accent:#00d4aa;--strong:#00d4aa;--weak:#e05c5c;
  --neutral:#5a8fc4;--gold:#c9a84c;--warn:#e8a23a;--purple:#a78bfa;--orange:#f97316;
  --font:'Poppins',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#00d4aa,#00a86b);border-radius:8px;display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:6px 6px 7px;}
.logo-bar{background:white;border-radius:2px;width:6px;}
.lb1{height:7px;opacity:0.4;}.lb2{height:11px;opacity:0.7;}.lb3{height:15px;opacity:1;}
.logo-text{font-size:18px;font-weight:600;letter-spacing:-0.5px;}
.logo-text span.d{color:#fff;}.logo-text span.b{color:var(--accent);}
.header-right{display:flex;align-items:center;gap:10px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite;}
.live-dot.live{background:var(--accent);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
#modeText{font-size:10px;color:var(--muted);}
#clockEl{font-size:10px;color:var(--muted);}

/* SPLASH OVERLAY */
#splashOverlay{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;}
#splashOverlay.hidden{display:none;}
.splash-logo{display:flex;align-items:center;gap:12px;margin-bottom:48px;}
.splash-logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#00d4aa,#00a86b);border-radius:12px;display:flex;align-items:flex-end;justify-content:center;gap:4px;padding:8px 8px 10px;}
.splash-logo-bar{background:white;border-radius:2px;width:8px;}
.slb1{height:10px;opacity:0.4;}.slb2{height:16px;opacity:0.7;}.slb3{height:22px;opacity:1;}
.splash-title{font-size:28px;font-weight:600;letter-spacing:-0.5px;}
.splash-title span.d{color:#fff;}.splash-title span.b{color:var(--accent);}
.splash-sub{font-size:13px;color:var(--muted);margin-bottom:48px;text-align:center;}

/* MARKET TABS */
.market-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;padding:0 4px;}
.market-bar::-webkit-scrollbar{display:none;}
.mkt-btn{font-size:10px;font-weight:500;padding:10px 14px;cursor:pointer;border:none;background:none;color:#c8cdd8;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;letter-spacing:0.04em;}
.mkt-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.mkt-btn:hover{color:var(--text);}

/* PAGES */
.page{display:none;padding:14px;}
.page.active{display:block;}
.sl{font-size:10px;letter-spacing:0.16em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}

/* CONTROLS */
.controls{display:flex;gap:8px;margin-bottom:14px;align-items:center;}
.btn{font-size:11px;padding:7px 14px;border-radius:6px;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;transition:all 0.15s;font-family:var(--font);}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.primary{border-color:var(--accent);color:var(--accent);background:rgba(0,212,170,0.08);}
.api-badge{font-size:10px;margin-left:auto;}
.api-badge.demo{color:var(--gold);}.api-badge.live{color:var(--strong);}

/* INDEX TAB */
.chart-wrap{display:flex;justify-content:center;margin:8px 0 20px;}
.index-legend{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.legend-item{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.legend-info{flex:1;}
.legend-code{font-size:12px;font-weight:600;color:#e8ecf4;}
.legend-name{font-size:9px;color:var(--muted);margin-top:1px;}
.legend-score{font-size:13px;font-weight:600;margin-left:auto;}
.legend-score.pos{color:var(--strong);}.legend-score.neg{color:var(--weak);}.legend-score.neu{color:var(--neutral);}

/* SIGNAL CARDS */
.signal-card{background:var(--surface);border-radius:8px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color 0.15s;}
.signal-card.grade-a{border:1px solid rgba(0,212,170,0.6);}
.signal-card.grade-b{border:1px solid rgba(201,168,76,0.5);}
.signal-card.grade-c{border:1px solid var(--border);}
.signal-card:hover{border-color:var(--accent)!important;}
.sc-header{display:flex;align-items:center;padding:12px 14px 10px;}
.sc-grade{font-size:11px;font-weight:600;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0;}
.sc-grade.a{background:rgba(0,212,170,0.15);color:var(--strong);}
.sc-grade.b{background:rgba(201,168,76,0.15);color:var(--gold);}
.sc-grade.c{background:rgba(90,143,196,0.15);color:var(--neutral);}
.sc-pair{font-size:15px;font-weight:600;color:#e8ecf4;}
.sc-mkt{font-size:9px;padding:2px 7px;border-radius:10px;margin-left:6px;font-weight:500;}
.sc-mkt.forex{background:rgba(0,212,170,0.12);color:var(--accent);}
.sc-mkt.metals{background:rgba(201,168,76,0.12);color:var(--gold);}
.sc-mkt.indices{background:rgba(90,143,196,0.12);color:var(--neutral);}
.sc-mkt.crypto{background:rgba(167,139,250,0.12);color:var(--purple);}
.sc-dir{font-size:10px;font-weight:600;padding:3px 9px;border-radius:4px;margin-left:8px;}
.sc-dir.buy{background:rgba(0,212,170,0.15);color:var(--strong);}
.sc-dir.sell{background:rgba(224,92,92,0.15);color:var(--weak);}
.sc-conf{font-size:12px;margin-left:auto;color:var(--text);}
.sc-conf span{color:var(--muted);font-size:10px;}
.sc-body{padding:0 14px 12px;}
.sc-reason{font-size:11px;color:var(--text);line-height:1.6;margin-bottom:10px;}
.sc-reason strong{color:var(--accent);}
.sc-levels{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
.sc-level{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:7px;text-align:center;}
.sc-level-label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:3px;}
.sc-level-val{font-size:15px;font-weight:600;}
.sc-level-val.entry{color:var(--neutral);}.sc-level-val.sl{color:var(--weak);}.sc-level-val.tp{color:var(--strong);}.sc-level-val.partial{color:var(--gold);}
.sc-tags{display:flex;gap:5px;flex-wrap:wrap;}
.sc-tag{font-size:9px;padding:3px 7px;border-radius:4px;border:1px solid var(--border);color:var(--muted);}
.sc-tag.hot{border-color:var(--accent);color:var(--accent);}
.sc-tag.warn{border-color:var(--warn);color:var(--warn);}

/* MARKET CARDS */
.market-grid{display:flex;flex-direction:column;gap:8px;}
.market-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 15px;cursor:pointer;transition:border-color 0.15s;}
.market-card:hover{border-color:var(--border2);}
.market-card.buy-card{border-left:3px solid var(--strong);}
.market-card.sell-card{border-left:3px solid var(--weak);}
.mc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.mc-sym{font-size:14px;font-weight:600;color:#e8ecf4;}
.mc-badge{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600;}
.mc-badge.strong-buy{background:rgba(0,212,170,0.15);color:var(--strong);}
.mc-badge.strong-sell{background:rgba(224,92,92,0.15);color:var(--weak);}
.mc-badge.buy{background:rgba(0,212,170,0.08);color:#00b890;}
.mc-badge.sell{background:rgba(224,92,92,0.08);color:#c07070;}
.mc-meta{display:flex;gap:12px;font-size:10px;color:var(--muted);}
.mc-meta span{color:var(--text);}
.mc-bar{margin-top:7px;height:2px;background:var(--border);border-radius:2px;}
.mc-bar-fill{height:100%;border-radius:2px;}
.mc-bar-fill.buy{background:var(--strong);}.mc-bar-fill.sell{background:var(--weak);}
.mc-tap{font-size:9px;color:var(--muted);margin-top:5px;text-align:right;}

/* FILTERS */
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filt-btn{font-size:10px;padding:5px 11px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:var(--font);}
.filt-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,170,0.08);}
.item-count{font-size:10px;color:var(--muted);margin-left:auto;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;display:none;overflow-y:auto;}
.modal-overlay.open{display:block;}
.modal{background:var(--surface);min-height:100vh;max-width:500px;margin:0 auto;padding-bottom:40px;}
.modal-header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10;}
.modal-back{font-size:28px;cursor:pointer;color:var(--accent);background:none;border:none;padding:4px 8px;font-family:var(--font);line-height:1;}
.modal-title{font-size:13px;font-weight:600;color:#e8ecf4;}
.modal-body{padding:18px;}
.verdict{border-radius:8px;padding:16px;text-align:center;margin-bottom:18px;border:1px solid;}
.verdict.valid{border-color:var(--strong);background:rgba(0,212,170,0.08);}
.verdict.invalid{border-color:var(--weak);background:rgba(224,92,92,0.08);}
.verdict.caution{border-color:var(--warn);background:rgba(232,162,58,0.08);}
.verdict-icon{font-size:26px;margin-bottom:5px;}
.verdict-title{font-size:13px;font-weight:600;letter-spacing:0.04em;}
.verdict.valid .verdict-title{color:var(--strong);}
.verdict.invalid .verdict-title{color:var(--weak);}
.verdict.caution .verdict-title{color:var(--warn);}
.verdict-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px;}
.stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center;}
.stat-label{font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px;}
.stat-val{font-size:15px;font-weight:600;color:#e8ecf4;}
.stat-val.green{color:var(--strong);}.stat-val.red{color:var(--weak);}.stat-val.gold{color:var(--gold);}
.levels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px;}
.level-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center;}
.level-label{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px;}
.level-label.entry{color:var(--neutral);}.level-label.sl{color:var(--weak);}.level-label.tp{color:var(--strong);}
.level-val{font-size:14px;font-weight:600;}
.level-val.entry{color:var(--neutral);}.level-val.sl{color:var(--weak);}.level-val.tp{color:var(--strong);}
.level-note{font-size:9px;color:var(--muted);margin-top:2px;}
.partial-box{background:var(--surface2);border:1px solid var(--gold);border-radius:6px;padding:11px 13px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.partial-label{font-size:10px;color:var(--gold);}
.partial-val{font-size:13px;font-weight:600;color:var(--gold);}
.conf-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:18px;}
.analysis-box{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:14px;}
.analysis-title{font-size:10px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.analysis-text{font-size:12px;line-height:1.7;color:var(--text);}
.warn-box{background:rgba(232,162,58,0.07);border:1px solid rgba(232,162,58,0.3);border-radius:6px;padding:10px 13px;margin-bottom:10px;font-size:11px;color:var(--warn);line-height:1.6;}
.loading{text-align:center;padding:40px;font-size:12px;color:var(--muted);}
.no-signals{text-align:center;padding:40px;font-size:11px;color:var(--muted);}

/* PIVOTS TAB */
.pivot-pair-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;}
.pivot-pair-card.alert-2{border-color:var(--strong);}
.pivot-pair-card.alert-1{border-color:var(--gold);}
.pivot-pair-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;}
.pivot-pair-sym{font-size:14px;font-weight:600;color:#e8ecf4;}
.pivot-price{font-size:13px;font-weight:600;color:var(--accent);}
.pivot-alert{font-size:10px;font-weight:600;padding:3px 9px;border-radius:4px;margin-left:8px;}
.pivot-alert.a2{background:rgba(0,212,170,0.15);color:var(--strong);}
.pivot-alert.a1{background:rgba(201,168,76,0.15);color:var(--gold);}
.pivot-alert.none{background:var(--surface2);color:var(--muted);}
.pivot-levels{padding:0 14px 12px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.pivot-level{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px;text-align:center;}
.pivot-level.near{border-color:var(--gold);background:rgba(201,168,76,0.07);}
.pivot-level.hit{border-color:var(--strong);background:rgba(0,212,170,0.07);}
.pivot-level-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:3px;}
.pivot-level-label.r{color:var(--weak);}.pivot-level-label.s{color:var(--strong);}.pivot-level-label.p{color:var(--neutral);}
.pivot-level-val{font-size:12px;font-weight:600;color:#e8ecf4;}
.pivot-level-dist{font-size:9px;color:var(--muted);margin-top:2px;}
.pivot-confluence{background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.3);border-radius:4px;padding:8px 12px;margin:0 14px 12px;font-size:11px;color:var(--gold);line-height:1.5;}
.pivot-confluence.strong{background:rgba(0,212,170,0.07);border-color:rgba(0,212,170,0.3);color:var(--strong);}
.pivot-filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.pivot-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.pivot-stat{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center;}
.pivot-stat-val{font-size:22px;font-weight:600;}
.pivot-stat-val.green{color:var(--strong);}.pivot-stat-val.gold{color:var(--gold);}.pivot-stat-val.muted{color:var(--muted);}
.pivot-stat-val.red{color:#e05c5c;}.pivot-stat-val.orange{color:#f97316;}
.pivot-stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:3px;}

/* PIVOT RANKING SECTIONS */
.pivot-rank-section{margin-bottom:20px;}
.pivot-rank-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;margin-bottom:8px;}
.pivot-rank-header.fortress{background:rgba(224,92,92,0.1);border:1px solid rgba(224,92,92,0.3);}
.pivot-rank-header.strong{background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.3);}
.pivot-rank-header.valid{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);}
.pivot-rank-header.unconfirmed{background:var(--surface);border:1px solid var(--border);}
.pivot-rank-icon{font-size:18px;}
.pivot-rank-title{font-size:13px;font-weight:600;}
.pivot-rank-header.fortress .pivot-rank-title{color:#e05c5c;}
.pivot-rank-header.strong .pivot-rank-title{color:#f97316;}
.pivot-rank-header.valid .pivot-rank-title{color:var(--gold);}
.pivot-rank-header.unconfirmed .pivot-rank-title{color:var(--muted);}
.pivot-rank-sub{font-size:10px;color:var(--muted);margin-left:auto;}
.pivot-rank-count{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;}
.fortress .pivot-rank-count{background:rgba(224,92,92,0.15);color:#e05c5c;}
.strong .pivot-rank-count{background:rgba(249,115,22,0.15);color:#f97316;}
.valid .pivot-rank-count{background:rgba(201,168,76,0.15);color:var(--gold);}
.unconfirmed .pivot-rank-count{background:var(--surface2);color:var(--muted);}

/* CHECK TAB */
.check-upload-area{border:2px dashed var(--border2);border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:16px;background:var(--surface);}
.check-upload-area:hover{border-color:var(--accent);background:rgba(0,212,170,0.04);}
.check-upload-area.has-image{border-color:var(--accent);border-style:solid;}
.check-upload-icon{font-size:40px;margin-bottom:12px;}
.check-upload-title{font-size:14px;font-weight:600;color:#e8ecf4;margin-bottom:6px;}
.check-upload-sub{font-size:11px;color:var(--muted);line-height:1.5;}
.check-preview{width:100%;border-radius:8px;margin-bottom:14px;display:none;}
.check-options{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.check-option{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all 0.15s;text-align:center;}
.check-option:hover{border-color:var(--accent);}
.check-option.selected{border-color:var(--accent);background:rgba(0,212,170,0.08);}
.check-option-icon{font-size:22px;margin-bottom:6px;}
.check-option-label{font-size:11px;font-weight:600;color:#e8ecf4;}
.check-option-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.check-analyse-btn{width:100%;padding:14px;background:linear-gradient(135deg,#00d4aa,#00a86b);border:none;border-radius:8px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;font-family:var(--font);margin-bottom:16px;transition:opacity 0.15s;}
.check-analyse-btn:hover{opacity:0.9;}
.check-analyse-btn:disabled{opacity:0.4;cursor:not-allowed;}
.check-result{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:none;}
.check-result-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.check-result-title{font-size:13px;font-weight:600;color:#e8ecf4;}
.check-result-body{padding:16px;}
.check-typing{display:flex;align-items:center;gap:8px;padding:20px;color:var(--muted);font-size:12px;}
.check-typing-dots{display:flex;gap:4px;}
.check-typing-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:typingDot 1.2s infinite;}
.check-typing-dot:nth-child(2){animation-delay:0.2s;}
.check-typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typingDot{0%,60%,100%{opacity:0.2;}30%{opacity:1;}}
.check-verdict-bar{display:flex;align-items:center;gap:10px;padding:14px;border-radius:8px;margin-bottom:14px;}
.check-verdict-bar.hold{background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.3);}
.check-verdict-bar.close{background:rgba(224,92,92,0.08);border:1px solid rgba(224,92,92,0.3);}
.check-verdict-bar.watch{background:rgba(232,162,58,0.08);border:1px solid rgba(232,162,58,0.3);}
.check-verdict-icon{font-size:28px;}

async function fetchFromJsonbin(){
  try {
    const url = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`;
    const res = await fetch(url, { headers: { 'X-Master-Key': JSONBIN_KEY } });
    const data = await res.json();
    const record = data.record;
    if(!record) return null;

    if(record.prices) LIVE_PRICES = record.prices;
    if(record.ts)     LIVE_TS     = record.ts * 1000;

    // Load auto pivot levels from EA (forex + extra instruments)
    if(record.pivots) loadLivePivots(record.pivots);

    // Momentum scores are now embedded in pivot data - loaded via loadLivePivots

    // Use H4 scores for index display
    const scoreData = record.scores_H4 || record.scores;
    if(scoreData){
      const SCORE_MAP = {DXY:'USD',EXY:'EUR',BXY:'GBP',AXY:'AUD',NXY:'NZD',CAD:'CAD',CHF:'CHF',JXY:'JPY'};
      const scores = Object.entries(scoreData).map(([k,v])=>({
        code: SCORE_MAP[k], score: parseFloat(parseFloat(v).toFixed(2)), change:0, ts: record.ts*1000,
        scoreW: record.scores_W ? parseFloat((record.scores_W[k]||0).toFixed(2)) : 0,
        scoreD: record.scores_D ? parseFloat((record.scores_D[k]||0).toFixed(2)) : 0,
      })).filter(s=>s.code).sort((a,b)=>b.score-a.score);
      return { scores, ts: record.ts*1000 };
    }
    return null;
  } catch(e){ console.log('Jsonbin fetch error:', e.message); return null; }
}

// Convert EA pivot format to PIVOT_LEVELS format
function loadLivePivots(pivotData){
  PIVOT_LEVELS.length = 0;
  Object.entries(pivotData).forEach(([pair, levels])=>{
    if(!Array.isArray(levels)) return;
    const price = getPrice(pair) || 1;
    const dec = price > 50 ? 2 : price > 1 ? 4 : 5;
    levels.forEach(lv=>{
      // Extract momentum entry (type='mom')
      if(lv.t === 'mom'){
        if(lv.m !== undefined) LIVE_MOMENTUM[pair] = lv.m;
        return;
      }
      // Regular pivot level
      if(lv.l === 0) return;
      PIVOT_LEVELS.push({
        pair, level:lv.l, type:lv.t, touches:lv.c, price, dec,
        note:`Auto-detected — ${lv.c} touches on Daily chart`
      });
    });
  });
  console.log('Loaded', PIVOT_LEVELS.length, 'pivot levels, momentum:', Object.keys(LIVE_MOMENTUM));
}

function renderIndex(){

function renderBarChart(sorted){
  const canvas=document.getElementById('barChart');
  if(!canvas) return;
  const dpr=window.devicePixelRatio||1;
  const W=Math.min(canvas.parentElement.offsetWidth-28,420)||340;
  const H=260;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const n=sorted.length;
  const padL=8,padR=8,padT=30,padB=28;
  const chartW=W-padL-padR,chartH=H-padT-padB;
  const slotW=chartW/n;
  const barW=Math.floor(slotW*0.6);
  const maxAbs=Math.max(...sorted.map(s=>Math.abs(s.score)),1);
  const zeroY=padT+chartH/2;

  const duration=700;
  const start=performance.now();

  function drawFrame(now){
    const elapsed=now-start;
    const ease=1-Math.pow(1-Math.min(elapsed/duration,1),3);
    ctx.clearRect(0,0,W,H);

    // Zero line
    ctx.strokeStyle='#2a2f3a';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(padL,zeroY);
    ctx.lineTo(W-padR,zeroY);
    ctx.stroke();

    sorted.forEach((s,i)=>{
      const color=RANK_COLORS[i];
      const cx=padL+i*slotW+slotW/2;
      const x=cx-barW/2;
      const fullH=Math.max((Math.abs(s.score)/maxAbs)*(chartH/2),3);
      const animH=fullH*ease;

      // Bar — grows up for positive, down for negative
      ctx.fillStyle=color;
      if(s.score>=0){
        ctx.beginPath();
        ctx.roundRect(x,zeroY-animH,barW,animH,4);
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.roundRect(x,zeroY,barW,animH,4);
        ctx.fill();
      }

      // Currency label below
      ctx.fillStyle='#e8ecf4';
      ctx.font='600 10px Poppins,sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='top';
      ctx.fillText(s.code,cx,H-padB+4);

      // Score label
      if(ease>0.6){
        ctx.globalAlpha=(ease-0.6)/0.4;
        ctx.font='9px Poppins,sans-serif';
        ctx.fillStyle=color;
        ctx.textBaseline='middle';
        if(s.score>=0){
          ctx.fillText((s.score>0?'+':'')+s.score.toFixed(1),cx,zeroY-animH-8);
        } else {
          ctx.fillText(s.score.toFixed(1),cx,zeroY+animH+8);
        }
        ctx.globalAlpha=1;
      }
    });

    if(ease<1) requestAnimationFrame(drawFrame);
  }
  requestAnimationFrame(drawFrame);
}

// ═══════════ BUILD FOREX OPPORTUNITIES ═══════════
function buildForexOpps(scores){
  const sorted=[...scores].sort((a,b)=>b.score-a.score);
  const opps=[];
  FOREX_PAIRS.forEach(pair=>{
    const base=pair.slice(0,3),quote=pair.slice(3,6);
    const bs=sorted.find(s=>s.code===base);
    const qs=sorted.find(s=>s.code===quote);
    if(!bs||!qs) return;
    const diff=bs.score-qs.score;
    const absDiff=Math.abs(diff);
    const direction=diff>0?'BUY':'SELL';
    const badge=absDiff>=3.5?(direction==='BUY'?'strong-buy':'strong-sell'):(direction==='BUY'?'buy':'sell');
    const badgeLabel=absDiff>=3.5?`STRONG ${direction}`:direction;
    let conf=5;
    if(absDiff>=5) conf+=3; else if(absDiff>=3.5) conf+=2; else if(absDiff>=2) conf+=1;
    if(absDiff>=2&&bs.score>0&&qs.score<0) conf+=1;
    if(absDiff>=4) conf+=1;
    conf=Math.min(conf,10);
    opps.push({pair,base,quote,direction,diff:absDiff,badge,badgeLabel,baseScore:bs.score,quoteScore:qs.score,conf,market:'forex'});
  });
  return opps.sort((a,b)=>b.diff-a.diff);
}

// ═══════════ BUILD METALS/INDICES/CRYPTO OPPS ═══════════
function buildMarketOpps(items, market){
  const usd=currentScores.find(s=>s.code==='USD');
  const usdScore=usd?usd.score:0;
  return items.map(item=>{
    // Metals inverse USD, Indices follow risk, Crypto follow momentum
    let direction,conf,reason;
    if(market==='metals'){
      direction=usdScore<0?'BUY':'SELL';
      conf=Math.min(5+Math.round(Math.abs(usdScore)*1.2),10);
      reason=`USD ${usdScore>0?'strength':'weakness'} ${usdScore>0?'pressures':'supports'} ${item.name} prices.`;
    } else if(market==='indices'){
      direction=usdScore<1?'BUY':'SELL';
      conf=Math.min(6+Math.round(Math.abs(usdScore)*0.5),10);
      reason=`Risk sentiment ${usdScore<1?'favourable':'cautious'} for ${item.name}.`;
    } else {
      direction=usdScore<0?'BUY':'SELL';
      conf=Math.min(5+Math.round(Math.abs(usdScore)),9);
      reason=`USD ${usdScore>0?'strength':'weakness'} creates ${usdScore<0?'tailwind':'headwind'} for ${item.name}.`;
    }
    const badge=conf>=8?(direction==='BUY'?'strong-buy':'strong-sell'):(direction==='BUY'?'buy':'sell');
    const badgeLabel=conf>=8?`STRONG ${direction}`:direction;
    const sl=direction==='BUY'
      ?parseFloat((item.price-item.slPips*item.pip).toFixed(item.dec))
      :parseFloat((item.price+item.slPips*item.pip).toFixed(item.dec));
    const tp=direction==='BUY'
      ?parseFloat((item.price+item.slPips*2*item.pip).toFixed(item.dec))
      :parseFloat((item.price-item.slPips*2*item.pip).toFixed(item.dec));
    const partial=direction==='BUY'
      ?parseFloat((item.price+item.slPips*item.pip).toFixed(item.dec))
      :parseFloat((item.price-item.slPips*item.pip).toFixed(item.dec));
    return {pair:item.sym,name:item.name,direction,conf,badge,badgeLabel,price:item.price,dec:item.dec,sl,tp,partial,reason,market,diff:conf/2};
  }).sort((a,b)=>b.conf-a.conf);
}

// ═══════════ WATCHLIST ALERTS ═══════════
function buildWatchlistSetups(){
  // Returns array of current setups (same logic as renderSignals but no DOM)
  PIVOT_LEVELS.forEach(p=>{ p.price = getPrice(p.pair) || p.price; });
  const setups = [];
  const processed = new Set();

  PIVOT_LEVELS.forEach(p=>{
    if(p.touches < 2) return;
    const livePrice = getPrice(p.pair) || 0;
    if(!livePrice) return;
    const threshold = getThreshold(livePrice);
    const nearZone = threshold * 0.6;
    if(Math.abs(livePrice - p.level) > nearZone) return;

    const bounceDir = p.type === 'resistance' ? 'SELL' : 'BUY';
    const pairKey = p.pair + bounceDir;
    if(processed.has(pairKey)) return;
    processed.add(pairKey);

    // Check strength/momentum confirms
    let confirms = false;
    let diff = 0;

    const isExtra = ['XAUUSD','NDX100','US30','BTCUSD'].includes(p.pair);
    if(isExtra){
      const mom = LIVE_MOMENTUM[p.pair] || 0;
      diff = Math.abs(mom);
      confirms = (bounceDir==='BUY' && mom > 0) || (bounceDir==='SELL' && mom < 0);
    } else {
      const base = p.pair.slice(0,3), quote = p.pair.slice(3,6);
      const baseS = currentScores.find(s=>s.code===base);
      const quoteS = currentScores.find(s=>s.code===quote);
      if(!baseS || !quoteS) return;
      if(bounceDir==='SELL') diff = quoteS.score - baseS.score;
      else diff = baseS.score - quoteS.score;
      confirms = diff > 0;
    }

    if(!confirms) return;

    const touchBoost = p.touches>=4?2.5:p.touches===3?1.5:0.5;
    const strengthBoost = Math.min(diff*0.8, 3.0);
    const finalConf = Math.min(5 + touchBoost + strengthBoost, 10);
    const pivotRank = p.touches>=4?'Fortress':p.touches===3?'Strong':'Valid';

    setups.push({ pair:p.pair, direction:bounceDir, finalConf, pivotRank,
      pivotType:p.type, pivotLevel:p.level, touches:p.touches });
  });

  return setups;
}

let isFirstAlertCheck = true;

async function checkWatchlistAlerts(){
  await fetchFromJsonbin();
  const current = buildWatchlistSetups();
  const currentKeys = {};
  current.forEach(s=>{ currentKeys[s.pair+s.direction] = s; });

  if(isFirstAlertCheck){
    // First run — just snapshot current state, don't alert
    LAST_WATCHLIST = currentKeys;
    isFirstAlertCheck = false;
    console.log('Watchlist baseline set —', Object.keys(currentKeys).length, 'setups tracked');
    return;
  }

  // Find NEW setups not in last check
  const newSetups = [];
  Object.entries(currentKeys).forEach(([key, setup])=>{
    if(!LAST_WATCHLIST[key]) newSetups.push(setup);
  });

  // Send Telegram alert for each new setup
  for(const s of newSetups){
    const price = getPrice(s.pair) || 0;
    const dec = price > 50 ? 2 : price > 1 ? 4 : 5;
    const msg = `🎯 <b>DASHBOX WATCHLIST ALERT</b>\n\n` +
      `<b>${s.pair}</b> ${s.direction}\n` +
      `${s.pivotRank} ${s.pivotType} at ${s.pivotLevel.toFixed(dec)} (tested ${s.touches}x)\n` +
      `Strength confirms ${s.direction} ✅\n` +
      `Conviction: ${s.finalConf.toFixed(1)}/10\n\n` +
      `Current price: ${price.toFixed(dec)}\n` +
      `⚠️ Wait for entry candle confirmation before entering.`;
    await sendTelegramAlert(msg);
  }

  LAST_WATCHLIST = currentKeys;
}

function startWatchlistAlerts(){
  if(ALERT_INTERVAL) clearInterval(ALERT_INTERVAL);
  // Check immediately then every 60s
  checkWatchlistAlerts();
  ALERT_INTERVAL = setInterval(checkWatchlistAlerts, 60000);
  console.log('Watchlist alerts started — checking every 60s');
}

function renderSignals(){
  const container = document.getElementById('signalList');

  fetchFromJsonbin().then(()=>{
    PIVOT_LEVELS.forEach(p=>{ p.price = getPrice(p.pair) || p.price; });

    const watchlist = [];
    const processed = new Set();

    // STEP 1: Find pairs where price is AT a key Daily pivot level
    PIVOT_LEVELS.forEach(p=>{
      if(p.touches < 3) return; // minimum 3 touches required
      const livePrice = getPrice(p.pair) || 0;
      if(!livePrice) return;

      const threshold = getThreshold(livePrice);
      const nearZone = threshold * 0.6;
      const dist = Math.abs(livePrice - p.level);
      if(dist > nearZone) return; // not near this level

      // Bounce direction from this level
      const bounceDir = p.type === 'resistance' ? 'SELL' : 'BUY';
      const pairKey = p.pair + bounceDir;
      if(processed.has(pairKey)) return;
      processed.add(pairKey);

      // STEP 2: Check strength indexes confirm the bounce
      const base = p.pair.slice(0,3);
      const quote = p.pair.slice(3,6);
      const baseS = currentScores.find(s=>s.code===base);
      const quoteS = currentScores.find(s=>s.code===quote);
      if(!baseS || !quoteS) return;

      const bScore = baseS.score;
      const qScore = quoteS.score;

      // SELL from resistance: quote must be stronger than base (base weak, quote strong)
      // BUY from support: base must be stronger than quote (base strong, quote weak)
      let diff = 0;
      if(bounceDir === 'SELL') diff = qScore - bScore; // positive = confirms SELL
      else diff = bScore - qScore;                       // positive = confirms BUY

      if(diff <= 1.5) return; // need 1.5pt differential minimum

      // Calculate conviction
      const touchBoost = p.touches >= 4 ? 2.5 : p.touches === 3 ? 1.5 : 0.5;
      const strengthBoost = Math.min(diff * 0.8, 3.0);
      const finalConf = Math.min(5 + touchBoost + strengthBoost, 10);

      // Levels
      const dec = livePrice > 50 ? 2 : livePrice > 1 ? 4 : 5;
      const isJpy = p.pair.includes('JPY');
      const pipVal = isJpy ? 0.01 : 0.0001;
      const slPips = isJpy ? 70 : 50;

      let sl, tp;
      if(bounceDir === 'BUY'){
        sl = parseFloat((livePrice - slPips*pipVal).toFixed(dec));
        tp = parseFloat((livePrice + slPips*2*pipVal).toFixed(dec));
      } else {
        sl = parseFloat((livePrice + slPips*pipVal).toFixed(dec));
        tp = parseFloat((livePrice - slPips*2*pipVal).toFixed(dec));
      }

      const pivotRank = p.touches >= 4 ? 'Fortress' : p.touches === 3 ? 'Strong' : 'Valid';

      watchlist.push({ pair:p.pair, base, quote, direction:bounceDir,
        price:livePrice, dec, sl, tp, finalConf,
        pivotLevel:p.level, pivotType:p.type, touches:p.touches, pivotRank,
        diff, bScore, qScore });
    });

    // Also scan extra instruments (Gold, Nasdaq, Dow, BTC)
    Object.entries(EXTRA_INSTRUMENTS).forEach(([sym, cfg])=>{
      const livePrice = getPrice(sym) || 0;
      if(!livePrice) return;
      const momentum = LIVE_MOMENTUM[sym] || 0;
      if(Math.abs(momentum) < 0.3) return; // not trending enough

      // Find nearby pivot levels for this instrument
      const threshold = getThreshold(livePrice);
      const nearZone = threshold * 0.6;

      PIVOT_LEVELS.filter(p=>p.pair===sym && p.touches>=2).forEach(p=>{
        const dist = Math.abs(livePrice - p.level);
        if(dist > nearZone) return;

        const bounceDir = p.type === 'resistance' ? 'SELL' : 'BUY';
        const pairKey = sym + bounceDir;
        if(processed.has(pairKey)) return;
        processed.add(pairKey);

        // Momentum must confirm bounce direction
        const confirms = (bounceDir==='BUY' && momentum > 0) || (bounceDir==='SELL' && momentum < 0);
        if(!confirms) return;

        const touchBoost = p.touches>=4?2.5:p.touches===3?1.5:0.5;
        const momBoost = Math.min(Math.abs(momentum)*0.8, 3.0);
        const finalConf = Math.min(5 + touchBoost + momBoost, 10);

        const dec = cfg.dec;
        const pipVal = cfg.pip;
        const slPips = cfg.slPips;
        let sl, tp;
        if(bounceDir==='BUY'){
          sl = parseFloat((livePrice - slPips*pipVal).toFixed(dec));
          tp = parseFloat((livePrice + slPips*2*pipVal).toFixed(dec));
        } else {
          sl = parseFloat((livePrice + slPips*pipVal).toFixed(dec));
          tp = parseFloat((livePrice - slPips*2*pipVal).toFixed(dec));
        }

        const pivotRank = p.touches>=4?'Fortress':p.touches===3?'Strong':'Valid';
        watchlist.push({
          pair:sym, base:cfg.name, quote:'', direction:bounceDir,
          price:livePrice, dec, sl, tp, finalConf,
          pivotLevel:p.level, pivotType:p.type, touches:p.touches, pivotRank,
          diff:Math.abs(momentum), bScore:momentum, qScore:0,
          market: cfg.market
        });
      });
    });

    watchlist.sort((a,b)=>b.finalConf-a.finalConf);
    const top = watchlist.slice(0,8);

    if(top.length === 0){
      container.innerHTML = `<div class="no-signals" style="padding:40px;text-align:center;color:var(--muted);font-size:12px;">

    top.forEach(o=>{

      const gradeLabel = o.finalConf >= 8.5 ? 'A' : o.finalConf >= 7 ? 'B' : 'C';
      const reason = o.quote
        ? `<strong>${o.base}</strong> ${o.bScore>0?'+':''}${o.bScore.toFixed(1)} vs <strong>${o.quote}</strong> ${o.qScore>0?'+':''}${o.qScore.toFixed(1)} — indexes confirm ${o.direction} from ${o.pivotRank} ${o.pivotType} at ${o.pivotLevel.toFixed(o.dec)} (tested ${o.touches}x).`
        : `<strong>${o.base}</strong> momentum ${o.bScore>0?'+':''}${o.bScore.toFixed(2)} — ${o.direction} confirmed from ${o.pivotRank} ${o.pivotType} at ${o.pivotLevel.toFixed(o.dec)} (tested ${o.touches}x).`;

      container.innerHTML += `

  const dec=isCrypto&&price>1000?0:isGold||isSilver?2:price>10?2:price>1?4:5;
  const pipVal=isJpy?0.01:isGold?1:isSilver?0.01:isIndex?1:isCrypto?1:0.0001;

function getRankInfo(touches){
  if(touches>=4) return {rank:'fortress',icon:'🔴',label:'FORTRESS',sub:'4+ touches — strongest level',color:'#e05c5c'};
  if(touches===3) return {rank:'strong',icon:'🟠',label:'STRONG',sub:'3 touches — high probability',color:'#f97316'};
  if(touches===2) return {rank:'valid',icon:'🟡',label:'VALID',sub:'2 touches — confirmed level',color:'#c9a84c'};
  return {rank:'unconfirmed',icon:'⚪',label:'UNCONFIRMED',sub:'1 touch — monitoring only',color:'#4a5060'};
}

function getPipsAway(price, level, dec){
  const diff = Math.abs(price - level);
  if(price > 50000) return Math.round(diff);        // BTC — show $ away
  if(price > 3000)  return Math.round(diff * 10)/10; // Gold — show $ away
  if(price > 1000)  return Math.round(diff);         // ETH/Indices — show $ away
  if(price > 100)   return Math.round(diff);         // NAS/SPX — show points
  if(price > 50)    return Math.round(diff / 0.01);  // JPY — pips
  return Math.round(diff / 0.0001);                  // Forex — pips
}

function getUnit(price){
  if(price > 1000) return '$';    // Crypto + Gold + Indices
  if(price > 50)   return 'pips'; // JPY
  return 'pips';                  // Standard forex
}

function getThreshold(price){
  if(price > 50000) return 2000;  // BTC — $2000
  if(price > 30000) return 1500;  // US30/NDX — $1500
  if(price > 3000)  return 80;    // Gold — $80
  if(price > 1000)  return 150;   // ETH/Indices
  if(price > 100)   return 75;    // NAS/SPX
  if(price > 50)    return 0.75;  // JPY — 75 pips
  if(price > 10)    return 0.75;  // Silver
  return 0.0075;                  // Forex — 75 pips
}

function renderPivots(){
  // Inject live prices before any calculation
  PIVOT_LEVELS.forEach(p=>{ p.price = getPrice(p.pair) || p.price; });

  // Only count levels within 75 pip equivalent
  const withinThreshold = PIVOT_LEVELS.filter(p=>{
    const threshold = getThreshold(p.price);
    return Math.abs(p.price - p.level) <= threshold;
  });

  const fortress = withinThreshold.filter(p=>p.touches>=4);
  const strong = withinThreshold.filter(p=>p.touches===3);
  const valid = withinThreshold.filter(p=>p.touches===2);

  document.getElementById('pvFortress').textContent = fortress.length;
  document.getElementById('pvStrong').textContent = strong.length;
  document.getElementById('pvValid').textContent = valid.length;

  applyPivotFilter(currentPivotFilter);
}

  currentPivotFilter = f;
  document.querySelectorAll('#tab-pivots .filt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyPivotFilter(f);
}

function applyPivotFilter(f){
  // First filter to only show levels within 75 pip equivalent
  let data = PIVOT_LEVELS.filter(p=>{
    const threshold = getThreshold(p.price);
    return Math.abs(p.price - p.level) <= threshold;
  });

  if(f==='fortress') data = data.filter(p=>p.touches>=4);
  if(f==='strong') data = data.filter(p=>p.touches===3);
  if(f==='valid') data = data.filter(p=>p.touches===2);
  if(f==='unconfirmed') data = data.filter(p=>p.touches===1);

  const container = document.getElementById('pivotList');
  container.innerHTML = '';

  // Group into sections
  const sections = f==='all'
    ? [{rank:'fortress',items:data.filter(p=>p.touches>=4)},
       {rank:'strong',items:data.filter(p=>p.touches===3)},
       {rank:'valid',items:data.filter(p=>p.touches===2)},
       {rank:'unconfirmed',items:data.filter(p=>p.touches===1)}]
    : [{rank:f,items:data}];

  sections.forEach(section=>{
    if(section.items.length===0) return;
    const info = getRankInfo(section.rank==='fortress'?4:section.rank==='strong'?3:section.rank==='valid'?2:1);

    let sectionHTML = `

        </div>`;

    section.items.forEach(p=>{
      p.price = getPrice(p.pair) || p.price;
      const pips = getPipsAway(p.price, p.level, p.dec);
      const threshold = getThreshold(p.price);
      const isInZone = Math.abs(p.price - p.level) <= threshold * 0.33;  // ~25 pips

function drawPivotChart(pair, level, currentPrice, type, touches, color){
  const canvas = document.getElementById('pivotChartCanvas');
  if(!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.offsetWidth - 20;
  const H = 200;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  // Generate simulated daily price history — touches RIGHT at the level
  const typeColor = type==='support'?'#00d4aa':'#e05c5c';
  const range = Math.abs(currentPrice - level) * 3.5;
  const high = Math.max(currentPrice, level) + range * 0.5;
  const low  = Math.min(currentPrice, level) - range * 0.15;
  const padL=8, padR=8, padT=14, padB=14;
  const cW=W-padL-padR, cH=H-padT-padB;

  const toY = val => padT + cH - ((val - low) / (high - low)) * cH;

  const candles = 60;
  const touchPoints = [];
  const prices = [];

  // Build price path that actually enters the zone for each touch
  const zoneSize = range * 0.04;
  const touchEvery = Math.floor(candles / (touches + 1));

  for(let i=0; i<candles; i++){
    const distFromTouch = touches > 0
      ? Math.min(...Array.from({length:touches}, (_,t)=>Math.abs(i - touchEvery*(t+1))))
      : candles;

    let target;
    if(distFromTouch <= 2){
      // AT the touch — price enters zone right at the level
      target = level + (Math.random()-0.5) * zoneSize * 0.5;
      if(distFromTouch === 0) touchPoints.push(i);
    } else if(distFromTouch <= 6){
      // Approaching or bouncing from level
      const side = type==='support' ? level + range*0.08 : level - range*0.08;
      target = side;
    } else {
      // Between touches — price away from level
      const away = type==='support' ? level + range*0.45 : level - range*0.45;
      target = away + (Math.random()-0.5)*range*0.1;
    }

    const prev = prices.length > 0 ? prices[prices.length-1] : target;
    const p = prev * 0.7 + target * 0.3 + (Math.random()-0.5)*zoneSize*0.3;
    prices.push(p);
  }

  // Final point = current price
  prices[candles-1] = currentPrice;

  // Draw zone rectangle
  const zoneHeight = range * 0.06;
  const zoneTop = toY(level + zoneHeight);
  const zoneBot = toY(level - zoneHeight);
  ctx.fillStyle = (type==='support'?'rgba(0,212,170,':'rgba(224,92,92,')+'0.08)';
  ctx.fillRect(padL, zoneTop, cW, zoneBot - zoneTop);

  // Draw level line
  ctx.strokeStyle = type==='support'?'#00d4aa':'#e05c5c';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4,3]);
  ctx.beginPath();
  ctx.moveTo(padL, toY(level));
  ctx.lineTo(W-padR, toY(level));
  ctx.stroke();
  ctx.setLineDash([]);

  // Level label
  ctx.fillStyle = type==='support'?'#00d4aa':'#e05c5c';
  ctx.font = '9px Poppins,sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText(level.toFixed(4), W-padR-2, toY(level)-8);

  // Draw price line
  ctx.strokeStyle = '#5a8fc4';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  prices.forEach((v,i)=>{
    const x = padL + (i/(candles-1))*cW;
    const y = toY(v);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Draw touch point circles
  touchPoints.slice(0, touches).forEach(i=>{
    const x = padL + (i/(candles-1))*cW;
    const y = toY(prices[i]);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI*2);
    ctx.fillStyle = type==='support'?'#00d4aa':'#e05c5c';
    ctx.fill();
    ctx.strokeStyle = '#0a0c0f';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Current price marker
  const curX = W-padR;
  const curY = toY(currentPrice);
  ctx.beginPath();
  ctx.arc(curX, curY, 5, 0, Math.PI*2);
  ctx.fillStyle = '#c9a84c';
  ctx.fill();

  // Current price label
  ctx.fillStyle = '#c9a84c';
  ctx.font = 'bold 9px Poppins,sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText('NOW', curX-8, curY);

  // Touch count label
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '9px Poppins,sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`${touches} touch${touches>1?'es':''}`, padL+4, padT+2);
}

}

function handleSlotUpload(idx, event){
  const file = event.target.files[0];
  if(!file) return;

}

function removeChart(idx){

function handleSlotDrop(idx, event){

  reader.onload = e => { checkImages[idx] = e.target.result; renderCheck(); };

}

const SCORE_MAP = {
  DXY:'USD', EXY:'EUR', BXY:'GBP', AXY:'AUD',
  NXY:'NZD', CAD:'CAD', CHF:'CHF', JXY:'JPY'
};

async function fetchStrengthFromTelegram(){
  try {
    const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/getUpdates?limit=100&allowed_updates=["message"]`;
    const controller = new AbortController();
    const timer = setTimeout(()=>controller.abort(), 8000);
    const res = await fetch(url, {signal: controller.signal});
    clearTimeout(timer);
    const data = await res.json();
    if(!data.ok) return null;
    const updates = [...(data.result||[])].reverse();
    for(const upd of updates){
      const text = upd?.message?.text || '';
      if(!text.startsWith('DASHBOX_SCORES')) continue;
      if(text.includes('||DASHBOX_PRICES')){
        parsePricesSection(text.split('||DASHBOX_PRICES')[1]);
      }
      const parsed = parseDashboxScores(text.split('||')[0]);
      if(parsed) return parsed;
    }
    return null;
  } catch(e){
    console.log('Telegram fetch failed:', e.message);
    return null;
  }
}

function parseDashboxScores(text){
  // Format: DASHBOX_SCORES|DXY:1.2345|EXY:-0.4567|...|ts:1718435200
  const parts = text.split('|');
  const raw = {};
  let ts = null;
  parts.forEach(p => {
    const [k, v] = p.split(':');
    if(SCORE_MAP[k]) raw[k] = parseFloat(v);
    if(k === 'ts') ts = parseInt(v) * 1000;
  });
  if(Object.keys(raw).length < 8) return null;
  const scores = Object.entries(raw).map(([key, score])=>({
    code: SCORE_MAP[key],
    score: parseFloat(score.toFixed(2)),
    change: 0,
    ts
  })).sort((a,b)=>b.score-a.score);
  return { scores, ts };
}

function getAgeString(ts){
  if(!ts) return '';
  const age = Math.round((Date.now() - ts) / 1000);
  if(age < 60) return `${age}s ago`;
  return `${Math.round(age/60)}m ago`;
}

function updateClock(){
  const sgt=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Singapore'}));
  const t=[sgt.getHours(),sgt.getMinutes()].map(n=>String(n).padStart(2,'0')).join(':');
  document.getElementById('clockEl').textContent=t;
}

// ═══════════ SPLASH ═══════════
async function splashRefresh(){
  const btn = document.querySelector('#splashOverlay button');
  const status = document.getElementById('splashStatus');
  btn.textContent = '⟳ Fetching live data...';
  btn.style.opacity = '0.7';
  btn.disabled = true;
  status.textContent = 'Connecting to MT4...';

  const result = await fetchFromJsonbin();

  if(result && result.scores && result.scores.length > 0){
    currentScores = result.scores;
    status.textContent = '✓ Live data loaded';
    setTimeout(()=>{
      document.getElementById('splashOverlay').classList.add('hidden');
      const b=document.getElementById('apiBadge');if(b){b.textContent='● Connected';b.className='api-badge live';}
      renderIndex();
      startWatchlistAlerts();
    }, 400);
  } else {
    // Try old scores format as fallback
    const raw = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`, {headers:{'X-Master-Key':JSONBIN_KEY}}).then(r=>r.json()).catch(()=>null);
    const rec = raw && raw.record;
    const scoreData = rec && (rec.scores_H4 || rec.scores);
    if(scoreData){
      const SCORE_MAP = {DXY:'USD',EXY:'EUR',BXY:'GBP',AXY:'AUD',NXY:'NZD',CAD:'CAD',CHF:'CHF',JXY:'JPY'};
      currentScores = Object.entries(scoreData).map(([k,v])=>({
        code:SCORE_MAP[k], score:parseFloat(parseFloat(v).toFixed(2)), change:0
      })).filter(s=>s.code).sort((a,b)=>b.score-a.score);
      if(rec.prices) LIVE_PRICES = rec.prices;
      status.textContent = '✓ Live data loaded';
      setTimeout(()=>{ document.getElementById('splashOverlay').classList.add('hidden'); renderIndex(); }, 400);
    } else {
      status.textContent = '⚠ No MT4 signal — check EA is running on VPS';
      btn.textContent = '↻ Try Again';
      btn.style.opacity = '1';
      btn.disabled = false;
    }
  }
}

// ═══════════ INIT ═══════════
currentScores = getDemoScores();
setInterval(updateClock,1000);
updateClock();

async function loadLiveData(){
  const badge = document.getElementById('apiBadge');
  const ageEl = document.getElementById('scoreAge');
  if(badge){ badge.textContent='● FETCHING...'; badge.className='api-badge demo'; }

  const result = await fetchFromJsonbin();

  if(result && result.scores && result.scores.length > 0){
    currentScores = result.scores;
    if(badge){ badge.textContent='● Connected'; badge.className='api-badge live'; }
    if(ageEl) ageEl.textContent = getAgeString(result.ts);
  } else {
    if(badge){ badge.textContent='● Not Connected'; badge.className='api-badge demo'; }
    if(ageEl) ageEl.textContent = 'Check EA on VPS';
  }
  renderIndex();

  // Auto-refresh every 60s
  setInterval(async ()=>{
    const r = await fetchFromJsonbin();
    if(r && r.scores && r.scores.length > 0){
      currentScores = r.scores;
      if(badge){ badge.textContent='● Connected'; badge.className='api-badge live'; }
      if(ageEl) ageEl.textContent = getAgeString(r.ts);
      renderIndex();
    }
  }, 60000);
}

async function reloadData(){
  const badge = document.getElementById('apiBadge');
  const ageEl = document.getElementById('scoreAge');
  if(badge){ badge.textContent='● FETCHING...'; badge.className='api-badge demo'; }
  const [result] = await Promise.all([fetchStrengthFromTelegram(), fetchPricesFromTelegram()]);
  if(result && result.scores.length > 0){
    currentScores = result.scores;
    if(badge){ badge.textContent='● Connected'; badge.className='api-badge live'; }
    if(ageEl) ageEl.textContent = getAgeString(result.ts);
  } else {
    if(badge){ badge.textContent='● Connected'; badge.className='api-badge live'; }
    if(ageEl) ageEl.textContent = getAgeString(currentScores[0]&&currentScores[0].ts);
  }
  renderIndex();
}
