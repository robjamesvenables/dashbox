<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Dashbox</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230a0c0f'/><rect x='4' y='20' width='6' height='8' rx='1.5' fill='white' opacity='0.4'/><rect x='13' y='14' width='6' height='14' rx='1.5' fill='white' opacity='0.7'/><rect x='22' y='8' width='6' height='20' rx='1.5' fill='%2300d4aa'/></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0c0f;--surface:#111318;--surface2:#181b22;
  --border:#1e2430;--border2:#252d3a;
  --text:#e8ecf4;--muted:#5a6478;--accent:#00d4aa;
  --strong:#00d4aa;--weak:#e05c5c;--gold:#f5c518;
  --font:'Inter',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
#splash.hidden{display:none}
.splash-logo{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.splash-icon{width:52px;height:52px;background:linear-gradient(135deg,#00d4aa,#00a86b);border-radius:14px;display:flex;align-items:flex-end;justify-content:center;gap:4px;padding:8px 8px 10px}
.splash-bar{background:white;border-radius:2px;width:9px}
.sb1{height:10px;opacity:0.4}.sb2{height:16px;opacity:0.7}.sb3{height:22px}
.splash-title{font-size:32px;font-weight:700;letter-spacing:-0.5px}
.splash-title .d{color:#fff}.splash-title .b{color:var(--accent)}
.splash-sub{font-size:13px;color:var(--muted);margin-bottom:52px;text-align:center}
.splash-btn{width:100%;max-width:340px;padding:18px;background:linear-gradient(135deg,#00d4aa,#00a86b);border:none;border-radius:14px;font-size:17px;font-weight:600;color:#fff;cursor:pointer;font-family:var(--font)}
#splashStatus{margin-top:16px;font-size:12px;color:var(--muted);text-align:center;min-height:18px}

/* NAV */
header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:0 16px}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer;text-decoration:none}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#00d4aa,#00a86b);border-radius:8px;display:flex;align-items:flex-end;justify-content:center;gap:3px;padding:5px 5px 6px}
.logo-bar{background:white;border-radius:1.5px;width:6px}
.lb1{height:6px;opacity:0.4}.lb2{height:10px;opacity:0.7}.lb3{height:14px}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.logo-text .d{color:#fff}.logo-text .b{color:var(--accent)}
#clock{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}

/* TABS */
nav{display:flex;overflow-x:hidden;gap:0;background:var(--bg);border-bottom:1px solid var(--border)}
nav::-webkit-scrollbar{display:none}
.tab{flex:1;padding:12px 8px;font-size:11px;font-weight:500;color:#b0b8cc;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;letter-spacing:0.02em;white-space:nowrap;font-family:var(--font);text-align:center}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* PAGES */
.page{display:none;padding:16px;max-width:600px;margin:0 auto;padding-bottom:80px}
.page.active{display:block}

/* INDEX */
.index-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.connected-dot{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:#3a3f4a}
.dot.live{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.refresh-btn{background:none;border:1px solid var(--border2);color:var(--muted);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--font)}
.tf-tabs{display:flex;gap:6px;margin-bottom:16px}
.tf-btn{flex:1;padding:7px;background:var(--surface);border:1px solid var(--border);border-radius:7px;font-size:11px;color:var(--muted);cursor:pointer;font-family:var(--font);transition:all 0.15s}
.tf-btn.active{background:rgba(0,212,170,0.1);border-color:var(--accent);color:var(--accent)}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 8px;margin-bottom:16px}
canvas{display:block;margin:0 auto}
.legend{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.legend-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between}
.legend-info{}
.legend-name{font-size:12px;font-weight:600;color:var(--text)}
.legend-rank{font-size:10px;color:var(--muted)}
.legend-score{font-size:15px;font-weight:700}

/* WATCHLIST */
.wl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.wl-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em}
.wl-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color 0.15s}
.wl-card:hover{border-color:var(--border2)}
.wl-card-top{padding:12px 14px;display:flex;align-items:center;gap:10px}
.wl-rank{font-size:12px;font-weight:700;min-width:28px}
.wl-pair{font-size:16px;font-weight:600;color:var(--text)}
.wl-badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;text-transform:uppercase}
.badge-sup{background:rgba(0,212,170,0.12);color:var(--accent)}
.badge-res{background:rgba(224,92,92,0.12);color:var(--weak)}
.wl-rank-label{font-size:10px;font-weight:600}
.wl-dir{margin-left:auto;font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px}
.dir-buy{background:rgba(0,212,170,0.1);color:var(--accent)}
.dir-sell{background:rgba(224,92,92,0.1);color:var(--weak)}
.wl-card-mid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-top:1px solid var(--border)}
.wl-stat{background:var(--surface);padding:10px 14px}
.wl-stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px}
.wl-stat-val{font-size:15px;font-weight:600}
.wl-card-bot{padding:10px 14px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.touch-dots{font-size:13px;letter-spacing:2px}

/* NEWS */
.news-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--weak);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.news-time{font-size:10px;color:var(--muted);margin-bottom:4px}
.news-event{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.news-currency{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:rgba(224,92,92,0.12);color:var(--weak)}
.news-warning{background:rgba(224,92,92,0.08);border:1px solid rgba(224,92,92,0.2);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--weak)}

/* CHECK */
.upload-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.upload-slot{aspect-ratio:1;border:2px dashed var(--border2);border-radius:10px;background:var(--surface);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:all 0.15s}
.upload-slot.filled{border-color:var(--accent);border-style:solid;background:rgba(0,212,170,0.04)}
.upload-slot img{width:100%;height:100%;object-fit:cover}
.upload-plus{font-size:24px;color:var(--muted);margin-bottom:4px}
.upload-label{font-size:9px;color:var(--muted);text-align:center}
.upload-x{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(224,92,92,0.9);border:none;border-radius:50%;color:white;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;z-index:10}
.analyse-btn{width:100%;padding:16px;background:linear-gradient(135deg,#00d4aa,#00a86b);border:none;border-radius:10px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;font-family:var(--font);margin-bottom:16px;opacity:0.4;pointer-events:none;transition:opacity 0.2s}
.analyse-btn.ready{opacity:1;pointer-events:all}
.check-result{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;display:none}
.result-verdict{font-size:14px;font-weight:700;margin-bottom:12px;padding:10px 14px;border-radius:8px;text-align:center}
.result-body{font-size:13px;line-height:1.7;color:var(--text)}
.result-section{font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;margin:12px 0 4px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:18px 18px 0 0;width:100%;max-width:600px;margin:0 auto;max-height:90vh;overflow-y:auto;padding-bottom:32px}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 16px}
.modal-pair{font-size:20px;font-weight:700;padding:0 20px;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--muted);padding:0 20px;margin-bottom:20px}
.modal-verdict{margin:0 16px 16px;padding:14px;border-radius:10px;text-align:center}
.modal-verdict .vt{font-size:13px;font-weight:700;margin-bottom:4px}
.modal-verdict .vs{font-size:11px;opacity:0.8}
.levels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px;margin-bottom:16px}
.level-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.level-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.level-val{font-size:14px;font-weight:600}
.val-entry{color:var(--accent)}
.val-sl{color:var(--weak)}
.val-tp{color:var(--accent)}
.modal-analysis{margin:0 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px}
.modal-analysis h4{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.modal-analysis p{font-size:12px;line-height:1.6;color:var(--text)}
.modal-warn{margin:12px 16px 0;background:rgba(224,92,92,0.06);border:1px solid rgba(224,92,92,0.15);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--weak)}

/* LOADING */
.loading{padding:40px;text-align:center;color:var(--muted);font-size:13px}
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">
    <div class="splash-icon">
      <div class="splash-bar sb1"></div>
      <div class="splash-bar sb2"></div>
      <div class="splash-bar sb3"></div>
    </div>
    <div class="splash-title"><span class="d">Dash</span><span class="b">box</span></div>
  </div>
  <div class="splash-sub">Currency Intelligence · Live</div>
  <button class="splash-btn" onclick="splashLoad()">↻ Load Live Data</button>
  <div id="splashStatus"></div>
</div>

<header>
  <div class="header-inner">
    <div class="logo" onclick="showTab('index')">
      <div class="logo-icon">
        <div class="logo-bar lb1"></div>
        <div class="logo-bar lb2"></div>
        <div class="logo-bar lb3"></div>
      </div>
      <div class="logo-text"><span class="d">Dash</span><span class="b">box</span></div>
    </div>
    <div id="clock"></div>
  </div>
</header>

<nav>
  <button class="tab active" id="tab-index" onclick="showTab('index')">🌐 Index</button>
  <button class="tab" id="tab-watchlist" onclick="showTab('watchlist')">🎯 Watchlist</button>
  <button class="tab" id="tab-news" onclick="showTab('news')">📰 News</button>
  <button class="tab" id="tab-check" onclick="showTab('check')">🔍 Check</button>
</nav>

<!-- INDEX -->
<div class="page active" id="page-index">
  <div class="index-header">
    <div class="connected-dot">
      <div class="dot" id="connDot"></div>
      <span id="connLabel">Loading...</span>
    </div>
    <button class="refresh-btn" onclick="reloadData()">↻ Refresh</button>
  </div>
  <div class="tf-tabs">
    <button class="tf-btn active" id="tf-W" onclick="switchTF('W')">Weekly</button>
    <button class="tf-btn" id="tf-D" onclick="switchTF('D')">Daily</button>
    <button class="tf-btn" id="tf-H4" onclick="switchTF('H4')">4 Hour</button>
  </div>
  <div class="chart-wrap">
    <canvas id="barChart" height="220"></canvas>
  </div>
  <div class="legend" id="legend"></div>
</div>

<!-- WATCHLIST -->
<div class="page" id="page-watchlist">
  <div class="wl-header">
    <div class="wl-title">Key Pivot Levels — Monitor</div>
    <button class="refresh-btn" onclick="renderWatchlist()">↻ Refresh</button>
  </div>
  <div id="wlList"></div>
</div>

<!-- NEWS -->
<div class="page" id="page-news">
  <div class="wl-header">
    <div class="wl-title">High Impact News — Today</div>
    <button class="refresh-btn" onclick="loadNews()">↻ Refresh</button>
  </div>
  <div id="newsList"><div class="loading">Loading news...</div></div>
</div>

<!-- CHECK -->
<div class="page" id="page-check">
  <div class="wl-title" style="margin-bottom:12px">Upload Charts for AI Analysis</div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6">
    Upload your Daily chart (pivot level) + 4H chart (entry candle). Claude will validate the setup against the Dashbox strategy.
  </div>
  <div class="upload-grid" id="uploadGrid"></div>
  <input type="file" id="f0" accept="image/*" style="display:none" onchange="uploadSlot(0,event)">
  <input type="file" id="f1" accept="image/*" style="display:none" onchange="uploadSlot(1,event)">
  <input type="file" id="f2" accept="image/*" style="display:none" onchange="uploadSlot(2,event)">
  <button class="analyse-btn" id="analyseBtn" onclick="runAnalysis()">⚡ Analyse Charts</button>
  <div class="check-result" id="checkResult"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-pair" id="mPair">--</div>
    <div class="modal-sub" id="mSub">--</div>
    <div class="modal-verdict" id="mVerdict"></div>
    <div class="levels-grid" id="mLevels"></div>
    <div class="modal-analysis" id="mAnalysis"></div>
    <div class="modal-warn" id="mWarn" style="display:none"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const JSONBIN_ID  = '6a2f6bf4f5f4af5e29f2bdc9';
const JSONBIN_KEY = '$2a$10$d0.NsjXsDQakZVLZnl4Lcuv1yl9POT37dx2yf4GzHZOWZxYk/JAya';
const TG_TOKEN    = '8500092691:AAHX_wIqo2p9qXOTe0RL-etw_41R1Q2bZXQ';
const TG_CHAT     = '8361135939';

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let SCORES_W  = {};
let SCORES_D  = {};
let SCORES_H4 = {};
let LIVE_PRICES = {};
let PIVOT_LEVELS = [];
let LIVE_MOMENTUM = {};
let currentTF = 'W';
let alertBaseline = null;
let alertInterval = null;
let checkImages = [null, null, null];

const CURRENCY_NAMES = {USD:'US Dollar',EUR:'Euro',GBP:'British Pound',AUD:'Australian Dollar',NZD:'New Zealand Dollar',CAD:'Canadian Dollar',CHF:'Swiss Franc',JPY:'Japanese Yen'};
const SCORE_MAP = {DXY:'USD',EXY:'EUR',BXY:'GBP',AXY:'AUD',NXY:'NZD',CAD:'CAD',CHF:'CHF',JXY:'JPY'};

// ═══════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════
setInterval(()=>{
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

// ═══════════════════════════════════════════════
// TAB ROUTING
// ═══════════════════════════════════════════════
function showTab(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='watchlist') renderWatchlist();
  if(name==='news') loadNews();
  if(name==='check') renderUploadGrid();
}

// ═══════════════════════════════════════════════
// JSONBIN FETCH
// ═══════════════════════════════════════════════
async function fetchData(){
  try{
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`,{
      headers:{'X-Master-Key':JSONBIN_KEY}
    });
    const data = await res.json();
    const r = data.record;
    if(!r) return false;

    if(r.prices) LIVE_PRICES = r.prices;

    // Parse W/D/H4 scores
    const parseScores = (obj)=>{
      const out = {};
      if(!obj) return out;
      Object.entries(obj).forEach(([k,v])=>{ if(SCORE_MAP[k]) out[SCORE_MAP[k]] = parseFloat(v); });
      return out;
    };
    SCORES_W  = parseScores(r.scores_W);
    SCORES_D  = parseScores(r.scores_D);
    SCORES_H4 = parseScores(r.scores_H4 || r.scores);

    // Parse pivots
    if(r.pivots) parsePivots(r.pivots);

    return true;
  }catch(e){ console.error('Fetch error:',e); return false; }
}

function parsePivots(pivotData){
  PIVOT_LEVELS = [];
  LIVE_MOMENTUM = {};
  Object.entries(pivotData).forEach(([pair,levels])=>{
    if(!Array.isArray(levels)) return;
    const price = LIVE_PRICES[pair] || 1;
    const dec = price>50000?1:price>3000?1:price>50?2:4;
    levels.forEach(lv=>{
      if(lv.t==='mom'){ if(lv.m!==undefined) LIVE_MOMENTUM[pair]=lv.m; return; }
      if(!lv.l) return;
      PIVOT_LEVELS.push({pair,level:lv.l,type:lv.t,touches:lv.c,price,dec});
    });
  });
}

function getPrice(sym){ return LIVE_PRICES[sym] || 0; }

function getScores(){
  if(currentTF==='W') return SCORES_W;
  if(currentTF==='D') return SCORES_D;
  return SCORES_H4;
}

function getSorted(){
  const s = getScores();
  return Object.entries(s).map(([code,score])=>({code,score})).sort((a,b)=>b.score-a.score);
}

// ═══════════════════════════════════════════════
// SPLASH
// ═══════════════════════════════════════════════
async function splashLoad(){
  const btn = document.querySelector('.splash-btn');
  const status = document.getElementById('splashStatus');
  btn.textContent = '⟳ Connecting...';
  btn.style.opacity = '0.6';
  status.textContent = 'Fetching live data from MT4...';

  const ok = await fetchData();

  if(ok && Object.keys(SCORES_H4).length > 0){
    status.textContent = '✓ Connected';
    setTimeout(()=>{
      document.getElementById('splash').classList.add('hidden');
      renderIndex();
      startAlerts();
      setInterval(async()=>{ await fetchData(); renderIndex(); }, 60000);
    }, 400);
  } else {
    status.textContent = '⚠ Could not connect — check MT4 EA is running';
    btn.textContent = '↻ Try Again';
    btn.style.opacity = '1';
  }
}

async function reloadData(){
  const dot = document.getElementById('connDot');
  const lbl = document.getElementById('connLabel');
  dot.className='dot';
  lbl.textContent='Refreshing...';
  const ok = await fetchData();
  if(ok){
    dot.className='dot live';
    lbl.textContent='Connected';
    renderIndex();
  } else {
    lbl.textContent='No signal';
  }
}

// ═══════════════════════════════════════════════
// INDEX — BAR CHART
// ═══════════════════════════════════════════════
const TF_COLORS = {
  W:  ['#00d4aa','#00c49a','#00b488','#7dcc99','#f5c518','#f59418','#e07060','#e05c5c'],
  D:  ['#00d4aa','#00c49a','#00b488','#7dcc99','#f5c518','#f59418','#e07060','#e05c5c'],
  H4: ['#00d4aa','#00c49a','#00b488','#7dcc99','#f5c518','#f59418','#e07060','#e05c5c'],
};

function switchTF(tf){
  currentTF = tf;
  ['W','D','H4'].forEach(t=>{
    document.getElementById('tf-'+t).classList.toggle('active', t===tf);
  });
  renderIndex();
}

function renderIndex(){
  const dot = document.getElementById('connDot');
  const lbl = document.getElementById('connLabel');
  dot.className = 'dot live';
  lbl.textContent = 'Connected';

  const sorted = getSorted();
  if(!sorted.length) return;

  renderBarChart(sorted);
  renderLegend(sorted);
}

function renderBarChart(sorted){
  const canvas = document.getElementById('barChart');
  const dpr = window.devicePixelRatio||1;
  const W = Math.max(Math.min(canvas.parentElement.offsetWidth-32, 560), 300);
  const H = 220;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const n = sorted.length;
  const padL=6,padR=6,padT=28,padB=22;
  const chartW=W-padL-padR, chartH=H-padT-padB;
  const slotW=chartW/n, barW=Math.floor(slotW*0.6);
  const maxAbs=Math.max(...sorted.map(s=>Math.abs(s.score)),0.5);
  const zeroY=padT+chartH/2;
  const colors=TF_COLORS[currentTF];

  const start=performance.now();
  function frame(now){
    const ease=1-Math.pow(1-Math.min((now-start)/600,1),3);
    ctx.clearRect(0,0,W,H);

    // Zero line
    ctx.strokeStyle='#1e2430';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(padL,zeroY);ctx.lineTo(W-padR,zeroY);ctx.stroke();

    sorted.forEach((s,i)=>{
      const color=colors[i]||'#888';
      const cx=padL+i*slotW+slotW/2;
      const x=cx-barW/2;
      const fullH=Math.max((Math.abs(s.score)/maxAbs)*(chartH/2-4),3);
      const animH=fullH*ease;

      ctx.fillStyle=color;
      if(s.score>=0){
        ctx.beginPath();ctx.roundRect(x,zeroY-animH,barW,animH,3);ctx.fill();
      } else {
        ctx.beginPath();ctx.roundRect(x,zeroY,barW,animH,3);ctx.fill();
      }

      // Currency label
      ctx.fillStyle='#8a9ab5';ctx.font=`600 9px Inter,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillText(s.code,cx,H-padB+4);

      // Score
      if(ease>0.5){
        ctx.globalAlpha=(ease-0.5)*2;
        ctx.fillStyle=color;ctx.font=`600 9px Inter,sans-serif`;
        ctx.textBaseline='middle';
        if(s.score>=0) ctx.fillText((s.score>0?'+':'')+s.score.toFixed(1),cx,zeroY-animH-9);
        else ctx.fillText(s.score.toFixed(1),cx,zeroY+animH+9);
        ctx.globalAlpha=1;
      }
    });
    if(ease<1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function renderLegend(sorted){
  const leg = document.getElementById('legend');
  const colors = TF_COLORS[currentTF];
  leg.innerHTML = sorted.map((s,i)=>`
    <div class="legend-item">
      <div class="legend-info">
        <div class="legend-name">${s.code}</div>
        <div class="legend-rank">#${i+1} · ${CURRENCY_NAMES[s.code]||s.code}</div>
      </div>
      <div class="legend-score" style="color:${colors[i]||'#888'}">${s.score>0?'+':''}${s.score.toFixed(1)}</div>
    </div>`).join('');
}

// WATCHLIST

function getPipThreshold(price){
  if(price>50000) return price*0.015;
  if(price>30000) return price*0.01;
  if(price>3000)  return 50;
  if(price>50)    return 0.50;
  return 0.005;
}

function getPipsAway(p1,p2,price){
  const diff=Math.abs(p1-p2);
  if(price>50000) return Math.round(diff/price*10000);
  if(price>3000)  return Math.round(diff);
  if(price>50)    return Math.round(diff*100);
  return Math.round(diff*10000);
}

function renderWatchlist(){
  const container = document.getElementById('wlList');
  PIVOT_LEVELS.forEach(p=>{ p.price = getPrice(p.pair)||p.price; });

  if(PIVOT_LEVELS.length===0){
    container.innerHTML = '<div class="empty">No data yet — tap Refresh to load live data.</div>';
    return;
  }

  const items = [];
  const seenPair = new Set();

  // Build list
  PIVOT_LEVELS.forEach(p=>{
    if(p.touches < 4) return;
    const price = getPrice(p.pair)||0;
    if(!price) return;
    const threshold = getPipThreshold(price);
    const dist = Math.abs(price-p.level);
    if(dist > threshold) return;

    // Only one entry per pair (closest level wins)
    if(seenPair.has(p.pair)) return;
    seenPair.add(p.pair);

    const bounceDir = p.type==='resistance'?'SELL':'BUY';
    const pips = getPipsAway(price,p.level,price);
    const pivotRank = p.touches>=6?'Fortress':p.touches>=4?'Strong':'Valid';

    // Breathing room to next level
    let breathRoom = 9999;
    PIVOT_LEVELS.forEach(other=>{
      if(other.pair!==p.pair||other.level===p.level||other.touches<2) return;
      if(bounceDir==='SELL'&&other.type==='support'&&other.level<price){
        const r=getPipsAway(p.level,other.level,price);
        if(r<breathRoom) breathRoom=r;
      }
      if(bounceDir==='BUY'&&other.type==='resistance'&&other.level>price){
        const r=getPipsAway(p.level,other.level,price);
        if(r<breathRoom) breathRoom=r;
      }
    });

    const quality = (p.touches*30)+(breathRoom<9999?Math.min(breathRoom*2,600):0);
    items.push({p,price,pips,pivotRank,bounceDir,quality,breathRoom});
  });

  // Sort by quality
  items.sort((a,b)=>b.quality-a.quality);

  if(items.length===0){
    container.innerHTML = '<div class="empty">No pairs at key levels right now.<br>The system is monitoring — you will get a Telegram alert when a setup appears.</div>';
    return;
  }

  const rankColors=['#f5c518','#a8a9ad','#cd7f32'];
  container.innerHTML = items.map(({p,price,pips,pivotRank,bounceDir,breathRoom},idx)=>{
    const rColor=rankColors[idx]||'var(--muted)';
    const dec=p.dec||(price>50?2:4);
    const isJpy=p.pair.includes('JPY');
    const pipVal=isJpy?0.01:price>3000?1:price>50?0.01:0.0001;
    const slPips=isJpy?120:price>3000?2500:100;
    let sl,tp;
    if(bounceDir==='BUY'){sl=(price-slPips*pipVal).toFixed(dec);tp=(price+slPips*pipVal).toFixed(dec);}
    else{sl=(price+slPips*pipVal).toFixed(dec);tp=(price-slPips*pipVal).toFixed(dec);}

    const dots='●'.repeat(Math.min(p.touches,5))+'○'.repeat(Math.max(0,5-p.touches));
    const roomText=breathRoom<9999?`${breathRoom} pips clear`:'Clear path';
    const pivRankColor=p.touches>=6?'var(--weak)':p.touches>=4?'#f59418':'var(--muted)';

    return `<div class="wl-card" onclick="openModal('${p.pair}','${bounceDir}','${p.type}',${price},'${p.level.toFixed(dec)}',${p.touches},'${pivotRank}','${sl}','${tp}')">
      <div class="wl-card-top">
        <div class="wl-rank" style="color:${rColor}">#${idx+1}</div>
        <div class="wl-pair">${p.pair}</div>
        <span class="wl-badge ${p.type==='support'?'badge-sup':'badge-res'}">${p.type==='support'?'SUPPORT':'RESISTANCE'}</span>
        <span class="wl-rank-label" style="color:${pivRankColor}">${pivotRank}</span>
        <div class="wl-dir ${bounceDir==='BUY'?'dir-buy':'dir-sell'}" style="margin-left:auto">${bounceDir}</div>
      </div>
      <div class="wl-card-mid">
        <div class="wl-stat">
          <div class="wl-stat-label">Key Level</div>
          <div class="wl-stat-val" style="color:${pivRankColor}">${p.level.toFixed(dec)}</div>
        </div>
        <div class="wl-stat">
          <div class="wl-stat-label">Current Price</div>
          <div class="wl-stat-val">${price.toFixed(dec)}</div>
        </div>
      </div>
      <div class="wl-card-bot">
        <span class="touch-dots" style="color:${pivRankColor}">${dots}</span>
        <span>Tested ${p.touches}x · ${roomText}</span>
      </div>
    </div>`;
  }).join('');
}

function openModal(pair,dir,type,price,level,touches,rank,sl,tp){
  const dec=price>50?2:4;
  const isJpy=pair.includes('JPY');
  const partial=dir==='BUY'?(price+(price-parseFloat(sl))*0.5).toFixed(dec):(price-(parseFloat(sl)-price)*0.5).toFixed(dec);

  document.getElementById('mPair').textContent=pair+' — '+dir;
  document.getElementById('mSub').textContent=`${rank} ${type} at ${level} · tested ${touches}x`;

  const vEl=document.getElementById('mVerdict');
  vEl.className='modal-verdict';
  vEl.style.background='rgba(0,212,170,0.06)';
  vEl.style.border='1px solid rgba(0,212,170,0.15)';
  vEl.innerHTML=`<div class="vt" style="color:var(--accent)">⚡ POTENTIAL SETUP</div>
    <div class="vs" style="color:var(--muted)">Price is at a key level. Wait for confirmation before entering.</div>`;

  document.getElementById('mLevels').innerHTML=`
    <div class="level-box"><div class="level-lbl">Key Level</div><div class="level-val val-entry">${level}</div></div>
    <div class="level-box"><div class="level-lbl">Current Price</div><div class="level-val">${price.toFixed(dec)}</div></div>
    <div class="level-box"><div class="level-lbl">Tested</div><div class="level-val val-tp">${touches}x</div></div>`;

  // Build WHY paragraph
  const base=pair.slice(0,3),quote=pair.slice(3,6);
  const wBase=SCORES_W[base]||0,wQuote=SCORES_W[quote]||0;
  const dBase=SCORES_D[base]||0,dQuote=SCORES_D[quote]||0;
  const hBase=SCORES_H4[base]||0,hQuote=SCORES_H4[quote]||0;
  const wAgree=dir==='BUY'?(wBase>wQuote):(wBase<wQuote);
  const dAgree=dir==='BUY'?(dBase>dQuote):(dBase<dQuote);
  const hAgree=dir==='BUY'?(hBase>hQuote):(hBase<hQuote);
  const tfCount=[wAgree,dAgree,hAgree].filter(Boolean).length;

  const dirWord=dir==='BUY'?'support':'resistance';
  const bounceWord=dir==='BUY'?'bounced higher':'rejected lower';
  const rankDesc=rank==='Fortress'?'an extremely strong fortress':rank==='Strong'?'a strong':'a valid';
  const tfDesc=tfCount===3?'Weekly, Daily and 4H all agree on direction — maximum alignment.':tfCount===2?'2 out of 3 timeframes agree on direction.':'Timeframes are mixed — extra caution needed.';

  const why=`${pair} is currently at ${rankDesc} ${dirWord} level at ${level}, which has been tested and respected ${touches} times on the Daily chart. Each time price has reached this zone, it has ${bounceWord} — showing clear institutional interest at this price. ${tfDesc} This makes it a potential ${dir} opportunity if price shows a confirmation signal at this level.`;

  document.getElementById('mAnalysis').innerHTML=`
    <h4>Why This Setup</h4>
    <p style="font-size:12px;line-height:1.7;color:var(--text);margin-bottom:14px">${why}</p>
    <div style="background:rgba(0,212,170,0.06);border:1px solid rgba(0,212,170,0.15);border-radius:8px;padding:12px">
      <div style="font-size:12px;font-weight:600;color:var(--accent);margin-bottom:6px">📊 Ready to enter?</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.6">Upload your Weekly, Daily and 4H charts to the <b style="color:var(--text)">Check tab</b> — Claude will confirm the entry, calculate your exact Stop Loss and Take Profit, and guide you on closing 50% at halfway and moving your stop to breakeven.</div>
    </div>`;

  const warnEl=document.getElementById('mWarn');
  const warnings=[];
  if(pair.includes('JPY')) warnings.push('BOJ intervention risk on JPY pairs.');
  if(pair.includes('CAD')) warnings.push('CAD sensitive to oil prices — check crude.');
  if(tfCount<2) warnings.push('Timeframes not aligned — wait for better confluence.');
  if(warnings.length){warnEl.style.display='block';warnEl.innerHTML='⚠ '+warnings.join(' · ');}
  else warnEl.style.display='none';

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}

async function loadNews(){
  const container=document.getElementById('newsList');
  container.innerHTML='<div class="loading">Loading high impact news...</div>';

  try{
    // Use ForexFactory calendar via CORS proxy
    const today=new Date().toISOString().split('T')[0];
    const url=`https://nfs.faireconomy.media/ff_calendar_thisweek.json`;
    const res=await fetch(url);
    const data=await res.json();

    // Filter to HIGH impact only (red)
    const todayStr=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const high=data.filter(e=>e.impact==='High');

    if(!high.length){
      container.innerHTML='<div class="empty">No high impact news today. Good day to trade!</div>';
      return;
    }

    // Check for imminent news (within 2 hours)
    const now=new Date();
    const warnings=[];
    high.forEach(e=>{
      if(!e.date) return;
      const eTime=new Date(e.date);
      const diff=(eTime-now)/60000; // minutes
      if(diff>0&&diff<120) warnings.push(`⚠️ ${e.currency} news in ${Math.round(diff)} mins — ${e.title}`);
    });

    let html='';
    if(warnings.length){
      html+=warnings.map(w=>`<div class="news-warning">${w}</div>`).join('');
    }

    html+=high.map(e=>{
      const t=e.date?new Date(e.date).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'TBA';
      return `<div class="news-card">
        <div class="news-time">${t} · ${e.country||''}</div>
        <div class="news-event">${e.title}</div>
        <div style="margin-top:5px"><span class="news-currency">${e.currency}</span></div>
      </div>`;
    }).join('');

    container.innerHTML=html||'<div class="empty">No high impact news found.</div>';
  }catch(e){
    console.error('News error:',e);
    container.innerHTML='<div class="empty">Could not load news. Try refreshing.</div>';
  }
}

function uploadSlot(idx,event){
  const file=event.target.files[0];
  if(!file) return;
  const r=new FileReader();
  r.onload=e=>{checkImages[idx]=e.target.result;renderUploadGrid();};
  r.readAsDataURL(file);
}

function dropFile(idx,event){
  const file=event.dataTransfer.files[0];
  if(!file) return;
  const r=new FileReader();
  r.onload=e=>{checkImages[idx]=e.target.result;renderUploadGrid();};
  r.readAsDataURL(file);
}

function removeImage(idx){
  checkImages[idx]=null;
  document.getElementById('f'+idx).value='';
  renderUploadGrid();
}

async function runAnalysis(){
  const btn=document.getElementById('analyseBtn');
  const result=document.getElementById('checkResult');
  btn.textContent='⟳ Analysing...';
  btn.classList.remove('ready');
  result.style.display='block';
  result.innerHTML='<div class="loading">Claude is analysing your charts...</div>';

  const PROMPT=`You are Dashbox AI — a professional forex trading analyst. Analyse the uploaded chart(s) using the Dashbox strategy and validate whether this is a valid trade entry.

THE DASHBOX STRATEGY:
- Key pivot levels on the Daily chart (support/resistance tested 4+ times)
- Entry trigger: confirmation candle at the level on the 4H chart
- Direction: BUY from support, SELL from resistance
- Weekly, Daily and 4H must ideally all agree on direction
- Stop Loss: 100 pips standard forex, 120 pips for JPY pairs (1:1 R:R)
- Take Profit: same distance as SL (1:1)
- At 50% of TP distance → close 50% of position and move SL to breakeven

RESPOND WITH THIS EXACT STRUCTURE:

VERDICT: [VALID ENTRY / POTENTIAL ENTRY / WAIT / AVOID]

PIVOT ANALYSIS:
• Is there a clear Daily pivot level visible?
• How many times has it been tested?
• Is this a genuine rejection or just price passing through?

4H SETUP:
• Is there a clear entry candle / confirmation at the level?
• What does the candle structure say?

TIMEFRAME ALIGNMENT:
• What does the Weekly trend suggest?
• What does the Daily trend suggest?
• Does the 4H confirm?

TRADE LEVELS:
• Entry: [exact price from chart]
• Stop Loss: [price] ([X] pips)
• Take Profit: [price] ([X] pips, 1:1)
• Partial close at: [halfway to TP]

CONCERNS:
• Any reasons NOT to take this trade?
• Any upcoming news risk?
• Is the level clean or messy?

CONFIDENCE: [X]/10
[One sentence reason]

Be direct, specific and use prices visible on the charts. Plain English — no jargon.`;

  const content=checkImages.filter(x=>x).map(img=>({
    type:'image',source:{type:'base64',media_type:img.split(';')[0].split(':')[1],data:img.split(',')[1]}
  }));
  content.push({type:'text',text:PROMPT});

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,messages:[{role:'user',content}]})
    });
    const data=await res.json();
    if(data.error){throw new Error(data.error.message);}
    const text=data.content[0].text;

    // Parse verdict
    const vLine=text.match(/VERDICT:\s*(.+)/i);
    const vText=vLine?vLine[1].trim():'ANALYSED';

      return `<div style="font-size:12px;padding:2px 0">${line}</div>`;
    }).join('');

    result.innerHTML=`

      </div>
      <div class="result-body">${bodyHtml}</div>`;

    result.innerHTML=`<div style="color:var(--weak);font-size:13px;padding:16px">

    </div>`;

async function sendTelegram(msg){
  try{
    const url=`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`;
    await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:TG_CHAT,text:msg,parse_mode:'HTML'})});
  }catch(e){}
}

function getAlertKey(pair,dir,level){return `${pair}|${dir}|${level}`;}

async function checkAlerts(){
  await fetchData();
  const current={};
  PIVOT_LEVELS.forEach(p=>{
    if(p.touches<4) return;
    const price=getPrice(p.pair)||0;
    if(!price) return;
    const threshold=getPipThreshold(price);
    if(Math.abs(price-p.level)>threshold) return;
    const dir=p.type==='resistance'?'SELL':'BUY';
    const key=getAlertKey(p.pair,dir,p.level);
    current[key]={p,price,dir};
  });

  if(alertBaseline===null){
    alertBaseline=current;
    return;
  }

  for(const [key,{p,price,dir}] of Object.entries(current)){
    if(!alertBaseline[key]){
      const dec=p.dec||(price>50?2:4);
      const rank=p.touches>=6?'Fortress':p.touches>=4?'Strong':'Valid';
      const msg=`🎯 <b>DASHBOX ALERT</b>\n\n<b>${p.pair}</b> ${dir}\n${rank} ${p.type} at ${p.level.toFixed(dec)} (tested ${p.touches}x)\n\nPrice: ${price.toFixed(dec)}\n⚠️ Price is at a key level. Wait for confirmation before entering.`;
      await sendTelegram(msg);
    }
  }
  alertBaseline=current;
}

function startAlerts(){
  if(alertInterval) return;
  checkAlerts();
  alertInterval=setInterval(checkAlerts,60000);
}
